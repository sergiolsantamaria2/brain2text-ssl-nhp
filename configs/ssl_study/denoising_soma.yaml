# SSL Study — Denoising Autoencoder on Somatosensory (~10h, S1)
# =====================================================================
# No temporal masking. Add Gaussian noise (std=0.5) to input, reconstruct
# clean signal. Bidirectional attention, MSE loss.
#
# Usage:
# Usage: python scripts/pretrain.py --config <this-file>

# ---- SSL Objective ----
ssl_objective: masked  # Uses SSLTransformerEncoder with denoising mode

# ---- Data ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/somatosensory
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  # Match finetuning pipeline
  log_transform: true

  # BIT-style augmentation (same as baseline masked)
  white_noise_std: 0.2
  constant_offset_std: 0.05
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (denoising mode) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  # No temporal masking
  mask_ratio: 0.0
  max_mask_span: 15
  # Denoising: add noise, reconstruct clean
  denoising_noise_std: 0.5

# ---- Training ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 200
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6
  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_study/denoising_soma
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretraining_study
  run_name: ssl_study_denoising_soma

gpu: 0
