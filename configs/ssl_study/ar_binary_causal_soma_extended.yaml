# SSL Study — AR Binary Somatosensory EXTENDED (epochs 200→400)
# =====================================================================
# Continues ar_binary_soma pretraining from epoch 200. The cosine LR schedule
# now targets 400 epochs, effectively giving a warm restart at the halfway point.
#
# Epoch 200 gave PER=0.122 @30k (best SSL result ever). The improving trend
# (100→0.126, 180→0.127, 200→0.122) suggests more pretraining could help.
#
# Uses the SAME checkpoint_dir as ar_binary_soma so it auto-resumes from epoch 200.
#
# Usage:
# Usage: python scripts/pretrain.py --config <this-file>

# ---- SSL Objective ----
ssl_objective: ar_binary

# ---- Data (identical to ar_binary_soma) ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/somatosensory
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  log_transform: false

  white_noise_std: 0.0
  constant_offset_std: 0.0
  gaussian_smooth_std: 0.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (identical) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  channel_mask_ratio: 0.3

# ---- Training: extended to 400 epochs ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 400
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6
  save_every_epochs: 20
  # SAME checkpoint_dir → auto-resumes from epoch 200
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_study/ar_binary_soma
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretraining_study
  run_name: ssl_study_ar_binary_soma_ext

gpu: 0
