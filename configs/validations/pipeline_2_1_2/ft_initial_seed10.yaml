# Phase C1 — Stage 1: Initial FT on T15 (50k batches, seed=10).
# =============================================================
# Single short FT to give the SSL stage a phoneme-aware starting point.
# Hyperparameters are h03-style (PER 0.0978 baseline at 200k):
#   resffn head, lr_max=3e-4, wd=5e-4, cosine over the full 50k, aug 0.8/0.2,
#   log_transform=true, epsilon=1e-8.
#
# IMPORTANT: save_final_model=true. Stage 2 will load the FINAL checkpoint,
# not the best-val one — we want the encoder at the end of cosine, which
# captures generic phonemic structure rather than the early-stopping minimum.
# Stage 1 produces both best_model.pt (kept for diagnostics) and
# final_checkpoint_batch_<N> (consumed by Stage 2).

output_dir: ${oc.env:JOB_OUT_DIR,trained_models/phase_c1_212/ft_initial_seed10}
checkpoint_dir: ${output_dir}/checkpoint

use_ema: false
seed: 10

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: null   # Stage 1 starts from random — no SSL init.
  head_type: resffn
  head_num_blocks: 1
  head_norm: layernorm
  head_dropout: 0.1
  head_activation: gelu
  input_speckle_p: 0.0
  time_mask_ratio: 0.0
  time_mask_max_span: 15

dataset:
  batch_size: 32
  seed: 10
  data_transforms:
    white_noise_std: 0.8
    constant_offset_std: 0.2
    log_transform: true

epsilon: 1e-8
weight_decay: 0.0005
weight_decay_day: 0

num_training_batches: 50000
lr_scheduler_type: cosine
lr_max: 0.0003
lr_max_day: 0.0003
lr_min: 1e-06
lr_min_day: 1e-06
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: true       # Stage 2 needs this.
early_stopping: false

wandb:
  enabled: true
  project: brain2text
  run_name: phase_c1_212_ft_initial_seed10
  group: phase_c1_212_ft_initial
  tags: ["phase_c1", "212", "stage1", "ft_initial", "t15", "seed10"]
