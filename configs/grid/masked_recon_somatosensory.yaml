# SSL Pretraining v2 — Somatosensory only (~10h, Area 2/S1) WITH log_transform
# =============================================================================
# Clean redo of ssl_ablation_somatosensory but with log_transform=true.
# Uses same HPs as the original ablation (lr=1e-3, wd=0.1, 200 epochs)
# since fewer data needs stronger regularization + more passes.
#
# KEY EXPERIMENT: S1 (10h, non-motor) transfers as well as All-NHP (200h, motor)
# → evidence for "universal cortical prior"
#
# Usage:
# Usage: python scripts/pretrain.py --config <this-file>

# ---- Data ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/somatosensory
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  # CRITICAL: log_transform must match finetuning (sign(x) * log1p(|x|))
  log_transform: true

  # Data augmentation (BIT Table 10 — transformer values)
  white_noise_std: 0.2
  constant_offset_std: 0.05
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (BIT Table 10) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  bidirectional: true
  positional_encoding: rope
  mask_ratio: 0.5
  max_mask_span: 15

# ---- Training (same as original somatosensory ablation) ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 200
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6
  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_v2_somatosensory_log
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretrain_v2
  run_name: ssl_v2_somatosensory_log

gpu: 0
