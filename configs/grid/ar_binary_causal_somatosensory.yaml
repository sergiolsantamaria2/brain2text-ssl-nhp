# SSL Study — AR Binary (SpikeGPT-style) on Somatosensory (~10h, S1)
# =====================================================================
# BCE loss on binarized spikes + channel masking (30% hidden) + causal attention.
# Inspired by SpikeGPT-style autoregressive prediction on binarized spike inputs.
#
# Key differences from masked reconstruction:
#   - BCE on (x > 0) binary spikes instead of MSE on z-scored signals
#   - Channel masking instead of temporal masking
#   - No log_transform (binarized data), no augmentation
#
# Usage:
# Usage: python scripts/pretrain.py --config <this-file>

# ---- SSL Objective ----
ssl_objective: ar_binary

# ---- Data ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/somatosensory
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  # No log_transform — we binarize (x > 0) in the model
  log_transform: false

  # No augmentation — we want raw spike patterns for binarization
  white_noise_std: 0.0
  constant_offset_std: 0.0
  gaussian_smooth_std: 0.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (same architecture as BIT Table 10, but causal + channel masking) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  channel_mask_ratio: 0.3

# ---- Training (same HPs as somatosensory masked: small data = stronger reg) ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 200
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6
  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_study/ar_binary_soma
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretraining_study
  run_name: ssl_study_ar_binary_soma

gpu: 0
