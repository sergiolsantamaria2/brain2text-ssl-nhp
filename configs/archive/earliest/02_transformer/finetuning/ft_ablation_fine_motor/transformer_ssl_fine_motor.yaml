# Transformer finetuning with SSL checkpoint from fine-motor-only pretraining
# Data ablation: measures contribution of fine motor data to SSL benefit
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/ssl_ablation/transformer_ssl_fine_motor}
checkpoint_dir: ${output_dir}/checkpoint

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  head_dim: 512
  ssl_checkpoint: ${CHECKPOINT_DIR}/ssl_ablation_fine_motor/best.pt

num_training_batches: 400000
lr_scheduler_type: cosine
lr_max: 0.002
lr_min: 0.00001
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_val_logits: false

wandb:
  enabled: true
  project: brain2text
  run_name: transformer_ssl_fine_motor
  group: ssl_data_ablation
  tags: ["transformer", "ssl", "fine_motor_only", "data_ablation"]
