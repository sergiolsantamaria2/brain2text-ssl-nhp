# Phase 2b — Augmentation sweep: white_noise=0.2, const_offset=0.05
# *** IMPORTANT: Replace FILL_BEST_LR and FILL_BEST_WD with Phase 1 winners ***
# *** Also set best patch_size/stride from Phase 2 ***
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/tfs_p2b/aug_bit}
checkpoint_dir: ${output_dir}/checkpoint

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  head_dim: 512
  ssl_checkpoint: ${CHECKPOINT_DIR}/ssl_pretrain_wd01/best.pt
  head_type: none
  head_num_blocks: 0

dataset:
  data_transforms:
    white_noise_std: 0.2
    constant_offset_std: 0.05

weight_decay: 0.0001
weight_decay_day: 0

num_training_batches: 75000
lr_scheduler_type: cosine
lr_max: 0.003
lr_max_day: 0.003
lr_min: 0.00001
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
save_val_logits: false

wandb:
  enabled: true
  project: brain2text
  run_name: tfs_p2b_aug_bit
  group: tfs_phase2b_aug
  tags: ["transformer", "ssl", "sweep", "phase2b", "augmentation", "aug_bit"]
