# SSL Pretrain — Lower mask ratio (0.3 vs baseline 0.5)
# Less masking = easier reconstruction, model sees more context
# Hypothesis: 50% masking may be too aggressive for NHP-only data
# Compare with: ssl_pretrain_wd01.yaml (mask_ratio=0.5, Val R²=0.16)

# ---- Data (IDENTICAL to ssl_pretrain_wd01) ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_pretrain
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  white_noise_std: 0.2
  constant_offset_std: 0.05
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  bidirectional: true
  positional_encoding: rope

  mask_ratio: 0.3               # KEY CHANGE: 30% masking (vs 50%)
  max_mask_span: 15

# ---- Training (IDENTICAL to ssl_pretrain_wd01) ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 400
  grad_clip: 10.0

  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6

  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_mask03
  resume_from: null

  val_every_epochs: 5
  val_metric: r2

  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretraining_sweep
  run_name: ssl_mask_ratio_03

gpu: 0
