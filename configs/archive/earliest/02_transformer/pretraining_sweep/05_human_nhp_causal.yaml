# SSL Pretrain — Human + NHP data with Causal objective
# Combines the two most impactful changes:
#   1. Human data inclusion (BIT-style, ~300h total)
#   2. Causal next-step prediction (thesis contribution 1)
# Hypothesis: human data + causal may interact positively
# Compare with: 01_human_nhp.yaml (masked), ssl_causal_wd01.yaml (NHP-only causal)

ssl_objective: causal

# ---- Data ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_pretrain
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: true             # KEY CHANGE 1: include human data
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  white_noise_std: 0.2
  constant_offset_std: 0.05
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (causal attention, same backbone) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5

  n_predict_steps: 3              # KEY CHANGE 2: causal prediction (300ms lookahead)

  # Ignored for causal but kept for config compatibility
  mask_ratio: 0.0
  max_mask_span: 0

# ---- Training (IDENTICAL to ssl_pretrain_wd01) ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 400
  grad_clip: 10.0

  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6

  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_human_nhp_causal
  resume_from: null

  val_every_epochs: 5
  val_metric: r2

  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretraining_sweep
  run_name: ssl_human_nhp_causal

gpu: 0
