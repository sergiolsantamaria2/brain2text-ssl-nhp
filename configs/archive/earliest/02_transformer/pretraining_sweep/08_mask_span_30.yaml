# SSL Pretrain — Longer mask spans (30 vs baseline 15)
# Longer spans = model must predict longer temporal gaps
# Hypothesis: longer spans force learning of slower dynamics
# Compare with: ssl_pretrain_wd01.yaml (max_mask_span=15, Val R²=0.16)

# ---- Data (IDENTICAL to ssl_pretrain_wd01) ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_pretrain
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  white_noise_std: 0.2
  constant_offset_std: 0.05
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  bidirectional: true
  positional_encoding: rope

  mask_ratio: 0.5
  max_mask_span: 30             # KEY CHANGE: long spans (vs 15)

# ---- Training (IDENTICAL to ssl_pretrain_wd01) ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 400
  grad_clip: 10.0

  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6

  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_span30
  resume_from: null

  val_every_epochs: 5
  val_metric: r2

  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretraining_sweep
  run_name: ssl_mask_span_30

gpu: 0
