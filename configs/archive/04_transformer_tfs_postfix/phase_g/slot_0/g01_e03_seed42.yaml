# Phase G — Multi-seed + EMA: e03 baseline with seed=42
# Base: e03 (lr=3e-4, wd=5e-4, aug=0.8/0.2, tmask=0.0, cosine 200k, eps=1e-8)
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/tfs_postfix/g01_e03_seed42}
checkpoint_dir: ${output_dir}/checkpoint

seed: 42
use_ema: true
ema_decay: 0.999

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: null
  head_type: none
  head_num_blocks: 0
  input_speckle_p: 0.0
  time_mask_ratio: 0.0
  time_mask_max_span: 15

dataset:
  batch_size: 32
  seed: 42
  data_transforms:
    white_noise_std: 0.8
    constant_offset_std: 0.2

epsilon: 1e-8
weight_decay: 0.0005
weight_decay_day: 0

num_training_batches: 200000
lr_scheduler_type: cosine
lr_max: 0.0003
lr_max_day: 0.0003
lr_min: 1e-05
lr_min_day: 1e-05
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
early_stopping: false

wandb:
  enabled: true
  project: brain2text
  run_name: tfs_pf_g01_e03_seed42
  group: tfs_t15_postfix_phaseG
  tags: ["transformer", "tfs", "t15", "epsilon_fix", "phaseG", "multi_seed"]
