# Phase I — SSL ablation: All NHP (~200h) + g03 HPs + log_transform
# Control: g03 (no SSL) = PER 0.0992
# Checkpoint: SSL pretrained on all NHP data (WD=0.1, R²=0.16)
# SSL pretraining used default epsilon (1e-8) — checkpoints are valid
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/tfs_postfix/i01_ssl_all_nhp}
checkpoint_dir: ${output_dir}/checkpoint

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: ${CHECKPOINT_DIR}/ssl_pretrain_wd01/best.pt
  head_type: none
  head_num_blocks: 0
  input_speckle_p: 0.0
  time_mask_ratio: 0.0
  time_mask_max_span: 15

dataset:
  batch_size: 32
  data_transforms:
    white_noise_std: 0.8
    constant_offset_std: 0.2
    log_transform: true

epsilon: 1e-8
weight_decay: 0.0005
weight_decay_day: 0

num_training_batches: 200000
lr_scheduler_type: cosine
lr_max: 0.0003
lr_max_day: 0.0003
lr_min: 1e-05
lr_min_day: 1e-05
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
early_stopping: false

wandb:
  enabled: true
  project: brain2text
  run_name: tfs_pf_i01_ssl_all_nhp
  group: tfs_t15_postfix_phaseI_ssl
  tags: ["transformer", "tfs", "t15", "epsilon_fix", "phaseI", "ssl", "all_nhp", "log_transform"]
