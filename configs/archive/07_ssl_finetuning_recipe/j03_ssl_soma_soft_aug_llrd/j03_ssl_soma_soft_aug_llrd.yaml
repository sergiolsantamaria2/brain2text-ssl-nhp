# j03 — SSL somatosensory (epoch 200) + soft aug + LLRD (combined)
# Hypothesis: both aggressive aug AND uniform LR destroy pretrained features.
# Combining soft aug (0.2/0.05) with LLRD (0.7) should give the best PER
# if both factors contribute independently.
# Base recipe: h03 (resffn head, log_transform, cosine 200k, lr_min=1e-6).
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/ssl_finetuning_recipe/j03_ssl_soma_soft_aug_llrd}
checkpoint_dir: ${output_dir}/checkpoint

use_ema: false

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: ${CHECKPOINT_DIR}/ssl_v2_somatosensory_log/epoch_0200.pt
  head_type: resffn
  head_num_blocks: 1
  head_norm: layernorm
  head_dropout: 0.1
  head_activation: gelu
  input_speckle_p: 0.0
  time_mask_ratio: 0.0
  time_mask_max_span: 15

dataset:
  batch_size: 32
  data_transforms:
    white_noise_std: 0.2
    constant_offset_std: 0.05
    log_transform: true

epsilon: 1e-8
weight_decay: 0.0005
weight_decay_day: 0

# Layer-wise LR decay for transformer blocks
llrd_decay: 0.7

num_training_batches: 200000
lr_scheduler_type: cosine
lr_max: 0.0003
lr_max_day: 0.0003
lr_min: 1e-06
lr_min_day: 1e-06
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
early_stopping: false

wandb:
  enabled: true
  project: brain2text
  run_name: j03_ssl_soma_soft_aug_llrd
  group: ssl_finetuning_recipe
  tags: ["transformer", "ssl_v2", "somatosensory", "finetuning_recipe", "soft_aug", "llrd"]
