# GRU SSL Pretraining — Causal Next-Step Prediction
# ==================================================
# Pretrains GRU layers with next-step prediction on NHP data.
# The GRU weights transfer directly to the finetuning decoder.
#
# Usage:
#   sbatch scripts/run_gru_ssl_pretrain.sbatch --config configs/gru_ssl/pretraining/all_nhp.yaml --name gru_ssl_all_nhp

# ---- Data ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_pretrain
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500          # 500 × 20ms = 10s windows
  patch_size: 1             # Unused by GRU model (patching done in model); must divide window_bins
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  # Augmentation (BIT Table 11 — RNN values)
  white_noise_std: 0.8
  constant_offset_std: 0.2
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model ----
model:
  gru_input_size: 7168      # Must match finetuning: neural_dim(512) × patch_size(14)
  n_units: 768              # GRU hidden size (same as finetuning)
  n_layers: 5               # GRU layers (same as finetuning)
  rnn_dropout: 0.3          # Between GRU layers during pretraining
  patch_size: 14            # Temporal patch (same as finetuning)
  patch_stride: 4           # Stride (same as finetuning)
  n_predict_steps: 3        # Predict 3 future patches (~240ms ahead)

# ---- Training ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 400
  grad_clip: 10.0

  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6

  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/gru_ssl_all_nhp
  resume_from: null

  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: gru_ssl
  run_name: gru_ssl_all_nhp

gpu: 0
