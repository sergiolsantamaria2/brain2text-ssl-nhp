# Batch 1 — sweep v3 best: mask=0.2 (best from s06), cosine decay 30k, train 250k
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/tfs_batch1/b1_04_lr4e-04_wd1e-03_bs16_m0.2}
checkpoint_dir: ${output_dir}/checkpoint

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: null
  head_type: none
  head_num_blocks: 0
  input_speckle_p: 0.0
  time_mask_ratio: 0.2
  time_mask_max_span: 15

dataset:
  batch_size: 16

weight_decay: 0.001
weight_decay_day: 0

num_training_batches: 250000
lr_scheduler_type: cosine
lr_max: 0.0004
lr_max_day: 0.0004
lr_min: 0.00001
lr_min_day: 0.00001
lr_decay_steps: 30000
lr_decay_steps_day: 30000
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
early_stopping: false

wandb:
  enabled: true
  project: brain2text
  run_name: tfs_b1_04_lr4e-04_wd1e-03_bs16_m0.2
  group: tfs_batch_1
  tags: ["transformer", "tfs", "batch_1", "long"]
