# Transformer TFS sweep v2 — config 15/20
# lr=1.68e-03, wd=8.71e-05, bs=64, time_mask=0.3
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/tfs_sweep/cfg15_lr2e-03_wd9e-05_bs64_m0.3}
checkpoint_dir: ${output_dir}/checkpoint

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: null
  head_type: none
  head_num_blocks: 0
  input_speckle_p: 0.0
  time_mask_ratio: 0.3
  time_mask_max_span: 15

dataset:
  batch_size: 64

weight_decay: 0.000087
weight_decay_day: 0

num_training_batches: 30000
lr_scheduler_type: cosine
lr_max: 0.001683
lr_max_day: 0.001683
lr_min: 0.00005609
lr_min_day: 0.00005609
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 500
lr_warmup_steps_day: 500

batches_per_val_step: 1000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
early_stopping: true
early_stopping_val_steps: 15

wandb:
  enabled: true
  project: brain2text
  run_name: tfs_cfg15_lr2e-03_wd9e-05_bs64_m0.3
  group: tfs_sweep_v2
  tags: ["transformer", "tfs", "sweep_v2"]
