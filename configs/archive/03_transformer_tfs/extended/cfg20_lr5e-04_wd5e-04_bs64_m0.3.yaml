# Transformer TFS extended — cfg20 second best (150k batches)
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/tfs_extended/cfg20_lr5e-04_wd5e-04_bs64_m0.3}
checkpoint_dir: ${output_dir}/checkpoint

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: null
  head_type: none
  head_num_blocks: 0
  input_speckle_p: 0.0
  time_mask_ratio: 0.3
  time_mask_max_span: 15

dataset:
  batch_size: 64

weight_decay: 0.0005
weight_decay_day: 0

num_training_batches: 150000
lr_scheduler_type: cosine
lr_max: 0.0005
lr_max_day: 0.0005
lr_min: 0.00001667
lr_min_day: 0.00001667
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
early_stopping: false
early_stopping_val_steps: 0

wandb:
  enabled: true
  project: brain2text
  run_name: tfs_ext_cfg20_lr5e-04_wd5e-04_bs64_m0.3
  group: tfs_extended
  tags: ["transformer", "tfs", "extended"]
