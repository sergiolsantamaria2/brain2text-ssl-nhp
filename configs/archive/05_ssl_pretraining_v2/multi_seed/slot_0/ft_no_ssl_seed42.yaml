# Multi-seed validation: No SSL control, seed=42
# Paired control for somatosensory seed=42.
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/ssl_v2_multi_seed/ft_no_ssl_seed42}
checkpoint_dir: ${output_dir}/checkpoint

use_ema: false
seed: 42

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: null
  head_type: resffn
  head_num_blocks: 1
  head_norm: layernorm
  head_dropout: 0.1
  head_activation: gelu
  input_speckle_p: 0.0
  time_mask_ratio: 0.0
  time_mask_max_span: 15

dataset:
  batch_size: 32
  seed: 42
  data_transforms:
    white_noise_std: 0.8 #BIT used 0.2
    constant_offset_std: 0.2 #BIT used 0.05
    log_transform: true # sign(x) * log1p(|x|), applied BEFORE augmentation

epsilon: 1e-8
weight_decay: 0.0005
weight_decay_day: 0

num_training_batches: 200000
lr_scheduler_type: cosine
lr_max: 0.0003
lr_max_day: 0.0003
lr_min: 1e-06
lr_min_day: 1e-06
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
early_stopping: false

wandb:
  enabled: true
  project: brain2text
  run_name: ft_no_ssl_seed42
  group: ssl_v2_multi_seed
  tags: ["transformer", "ssl_v2", "no_ssl", "control", "multi_seed", "seed42"]
