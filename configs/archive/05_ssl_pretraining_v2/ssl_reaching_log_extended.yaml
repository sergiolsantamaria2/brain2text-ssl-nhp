# SSL Pretraining v2 — Reaching EXTENDED (epochs 200→400) WITH log_transform
# =============================================================================
# Continues ssl_reaching_log from epoch 200. Cosine LR targets 400 epochs,
# giving a warm restart. Same checkpoint_dir → auto-resumes from epoch 200.
#
# Usage:
#   sbatch scripts/run_masked_reaching_extended.sbatch

# ---- Data (identical to ssl_reaching_log) ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/reaching
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  log_transform: true

  white_noise_std: 0.2
  constant_offset_std: 0.05
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (identical) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.2
  attn_dropout: 0.4
  bidirectional: true
  positional_encoding: rope
  mask_ratio: 0.5
  max_mask_span: 15

# ---- Training: extended to 400 epochs ----
training:
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-5
  n_epochs: 400
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 10
  min_lr: 1.0e-6
  save_every_epochs: 50
  # SAME checkpoint_dir → auto-resumes from epoch 200
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_v2_reaching_log
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretrain_v2
  run_name: ssl_v2_reaching_log_ext

gpu: 0
