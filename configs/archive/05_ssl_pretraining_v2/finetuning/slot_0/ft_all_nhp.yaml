# Finetuning — SSL v2 All NHP checkpoint → T15 phoneme decoding
# ==============================================================
# Based on h03 (best TFS: PER=0.0992) with SSL pretrained weights.
# Checkpoint trained WITH log_transform — no distribution mismatch.
#
# Launch AFTER ssl_v2_all_nhp_log pretraining completes.
output_dir: ${oc.env:JOB_OUT_DIR,trained_models/ssl_v2/ft_all_nhp}
checkpoint_dir: ${output_dir}/checkpoint

use_ema: false

model:
  decoder_type: transformer
  embed_dim: 384
  n_heads: 6
  n_layers: 7
  ff_dim: null
  head_dim: 512
  attn_dropout: 0.4
  rnn_dropout: 0.2
  patch_size: 5
  patch_stride: 5
  ssl_checkpoint: ${CHECKPOINT_DIR}/ssl_v2_all_nhp_log/best.pt
  head_type: resffn
  head_num_blocks: 1
  head_norm: layernorm
  head_dropout: 0.1
  head_activation: gelu
  input_speckle_p: 0.0
  time_mask_ratio: 0.0
  time_mask_max_span: 15

dataset:
  batch_size: 32
  data_transforms:
    white_noise_std: 0.8
    constant_offset_std: 0.2
    log_transform: true

epsilon: 1e-8
weight_decay: 0.0005
weight_decay_day: 0

num_training_batches: 200000
lr_scheduler_type: cosine
lr_max: 0.0003
lr_max_day: 0.0003
lr_min: 1e-06
lr_min_day: 1e-06
lr_decay_steps: ${num_training_batches}
lr_decay_steps_day: ${num_training_batches}
lr_warmup_steps: 1000
lr_warmup_steps_day: 1000

batches_per_val_step: 2000
save_best_checkpoint: true
save_all_val_steps: false
save_final_model: false
early_stopping: false

wandb:
  enabled: true
  project: brain2text
  run_name: ft_ssl_all_nhp_log
  group: ssl_v2_finetuning
  tags: ["transformer", "tfs", "t15", "ssl_v2", "all_nhp", "log_transform", "resffn"]
