# SSL Pretraining v2 — Causal (next-step prediction) on All NHP (~200h)
# =====================================================================
# Same data/architecture as ssl_all_nhp_log but with CAUSAL SSL objective.
# Uses autoregressive attention + predicts next N patches instead of masked reconstruction.
#
# Comparison with ssl_causal_somatosensory: more data (200h vs 10h), motor cortex.
# Masked version (ssl_all_nhp_log) gave PER=0.1051 — worse than control.
# Causal may behave differently since it captures temporal dynamics.
#
# Usage:
#   sbatch scripts/run_ssl_pretrain_v2.sbatch --config configs/experiments/05_ssl_pretraining_v2/ssl_causal_all_nhp.yaml --name ssl_v2_causal_all_nhp

# ---- SSL Objective ----
ssl_objective: causal

# ---- Data (same as masked all_nhp) ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_pretrain
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  # CRITICAL: log_transform must match finetuning (sign(x) * log1p(|x|))
  log_transform: true

  # Data augmentation (BIT Table 10 — transformer values)
  white_noise_std: 0.2
  constant_offset_std: 0.05
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (BIT Table 10, causal variant) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.2
  attn_dropout: 0.4
  n_predict_steps: 3

# ---- Training (same schedule as masked all_nhp) ----
training:
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-5
  n_epochs: 400
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 10
  min_lr: 1.0e-6
  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_v2_causal_all_nhp
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretrain_v2
  run_name: ssl_v2_causal_all_nhp

gpu: 0
