# SSL Pretraining v2 — Somatosensory + Reaching combined (~127h) WITH log_transform
# =================================================================================
# Combined cortical areas: S1/Area 2 (10h, non-motor) + M1/PMd reaching (117h, motor).
# Tests the hypothesis that 10h alone (somatosensory) is too little data to learn
# robust pretrained features, and that adding reaching data stabilizes without
# imposing the harmful motor bias seen with All NHP (200h).
#
# HPs: based on all_nhp (200h) since 127h is similar scale.
# Key difference from all_nhp: excludes fine_motor (68h) which is purely M1/hand.
#
# Usage:
#   sbatch scripts/run_ssl_pretrain_v2.sbatch --config configs/experiments/05_ssl_pretraining_v2/ssl_soma_reaching_log.yaml --name ssl_v2_soma_reaching_log

# ---- Data ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/soma_reaching
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  # CRITICAL: log_transform must match finetuning (sign(x) * log1p(|x|))
  log_transform: true

  # Data augmentation (BIT Table 10 — transformer values)
  white_noise_std: 0.2
  constant_offset_std: 0.05
  gaussian_smooth_std: 2.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (BIT Table 10) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.2
  attn_dropout: 0.4
  bidirectional: true
  positional_encoding: rope
  mask_ratio: 0.5
  max_mask_span: 15

# ---- Training (all_nhp HPs — 127h is similar scale to 200h) ----
training:
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-5
  n_epochs: 400
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 10
  min_lr: 1.0e-6
  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_v2_soma_reaching_log
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_pretrain_v2
  run_name: ssl_v2_soma_reaching_log

gpu: 0
