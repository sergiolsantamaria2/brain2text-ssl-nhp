# SSL Study — AR Binary BIDIRECTIONAL (dual loss) on Somatosensory
# =====================================================================
# Architectural ablation of Técnica 4 (ar_binary_soma): same dual loss
# (ar_visible + ar_hidden) and channel-masking recipe, but the transformer
# uses bidirectional self-attention instead of causal.
#
# Cierra la matriz atención × pérdidas:
#   Causal + dual           → Técnica 4 ganadora (PER 0.118 / FT 0.0918)
#   Bidir  + ar_hidden only → ablación 4-ab (VENENO confirmado)
#   Bidir  + dual           → ESTA ablación (4-ab2)
#
# Hipótesis de shortcut: con atención bidireccional, ar_visible (predecir el
# patch t+1 desde el patch t) es trivialmente resoluble vía la atención
# forward-looking. Esperar ar_visible_loss → 0 rápido y ar_hidden_loss alta.
#
# Todas las HPs idénticas a ar_binary_soma.yaml; solo cambian ssl_objective,
# checkpoint_dir y wandb tags.
#
# Usage:
# Usage: python scripts/pretrain.py --config <this-file>
# Usage: python scripts/pretrain.py --config <this-file>

# ---- SSL Objective ----
ssl_objective: ar_binary_bidir

# ---- Data ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/somatosensory
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  log_transform: false

  white_noise_std: 0.0
  constant_offset_std: 0.0
  gaussian_smooth_std: 0.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (BIT Table 10 + bidirectional + channel masking 30%) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  channel_mask_ratio: 0.3

# ---- Training (idénticas a ar_binary_soma.yaml) ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 200
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6
  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_study/ar_binary_bidir_soma
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_study_ar_binary_bidir
  run_name: ssl_study_ar_binary_bidir_soma

gpu: 0
