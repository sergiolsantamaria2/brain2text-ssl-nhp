# SSL Study — AR Binary Hidden-Only (BIDIRECTIONAL ablation) on Somatosensory
# ===========================================================================
# Ablation of Técnica 4 (ar_binary_soma): same architecture and channel-masking
# recipe, but bidirectional attention and only the ar_hidden BCE loss
# (ar_visible removed because it is trivial under bidirectional attention).
#
# Question: does ar_visible actually add downstream signal, or is the
# directionally-clean version (bidirectional + ar_hidden only) at least as
# good as the dual?
#
# All HPs identical to ar_binary_soma.yaml; only ssl_objective + paths differ.
#
# Usage:
# Usage: python scripts/pretrain.py --config <this-file>

# ---- SSL Objective ----
ssl_objective: ar_binary_hidden_only

# ---- Data ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/somatosensory
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  log_transform: false

  white_noise_std: 0.0
  constant_offset_std: 0.0
  gaussian_smooth_std: 0.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (BIT Table 10 + bidirectional + channel masking 30%) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  channel_mask_ratio: 0.3

# ---- Training (idénticas a ar_binary_soma.yaml) ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 200
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6
  save_every_epochs: 20
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_study/ar_binary_hidden_only_soma
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_study_ar_binary_hidden_only
  run_name: ssl_study_ar_binary_hidden_only_soma

gpu: 0
