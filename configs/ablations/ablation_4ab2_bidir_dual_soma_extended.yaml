# SSL Study — AR Binary BIDIR Dual Somatosensory EXTENDED (epochs 200→400)
# =====================================================================
# Continúa el pretraining de ar_binary_bidir_soma desde epoch 200. La cosine
# LR ahora apunta a 400 epochs (warm restart implícito en el punto medio):
#
#   Base run (n_epochs=200): lr a epoch 200 ≈ min_lr (1e-6)
#   Extended (n_epochs=400): al reanudar a epoch 200,
#     progress = (200-20)/(400-20) = 0.474
#     lr = 0.5 × (1 + cos(π·0.474)) × base_lr = 0.5 × (1 + 0.083) × 1e-3
#        ≈ 5.4e-4
#   → Las 200 épocas adicionales recorren la 2ª mitad de una cosine fresca,
#     desde ~5.4e-4 hasta ~1e-6 (smooth, sin saltos discretos en el lambda
#     porque LambdaLR sólo guarda last_epoch en su state_dict y la lambda se
#     recomputa al construir el trainer con el nuevo n_epochs).
#
# Mejor PER @30k base run = 0.11652 (epoch 200, en descenso monotónico
# entre 180→200). La hipótesis es que más pretraining sigue ayudando.
#
# Mismo checkpoint_dir que el base run → auto-resume desde epoch_0200.pt.
#
# Usage:
# Usage: python scripts/pretrain.py --config <this-file>
# Usage: python scripts/pretrain.py --config <this-file>

# ---- SSL Objective ----
ssl_objective: ar_binary_bidir

# ---- Data (idénticas a ar_binary_bidir_soma) ----
data:
  nhp_pretrain_dir: ${DATA_DIR}/nhp_ablation/somatosensory
  human_data_dir: ${DATA_DIR}/hdf5_data_final
  include_human: false
  human_use_only_tx: true

  window_bins: 500
  patch_size: 5
  min_session_bins: 100

  batch_size: 64
  n_batches_per_epoch: 1000
  val_fraction: 0.1
  seed: 42

  log_transform: false

  white_noise_std: 0.0
  constant_offset_std: 0.0
  gaussian_smooth_std: 0.0
  gaussian_smooth_kernel_size: 11

  num_workers: 0
  pin_memory: true
  min_subject_hours: 0.1

# ---- Model (idéntico) ----
model:
  embed_dim: 384
  n_heads: 6
  head_dim: 512
  depth: 7
  ff_dim: null
  patch_size: 5
  dropout: 0.3
  attn_dropout: 0.5
  channel_mask_ratio: 0.3

# ---- Training: extended to 400 epochs ----
training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.1
  n_epochs: 400
  grad_clip: 10.0
  lr_scheduler: cosine
  warmup_epochs: 20
  min_lr: 1.0e-6
  save_every_epochs: 20
  # SAME checkpoint_dir que el base run → auto-resume desde epoch 200
  checkpoint_dir: ${CHECKPOINT_DIR}/ssl_study/ar_binary_bidir_soma
  resume_from: null
  val_every_epochs: 5
  use_amp: true

# ---- Logging ----
wandb:
  enabled: true
  project: brain2text
  group: ssl_study_ar_binary_bidir_extended
  run_name: ssl_study_ar_binary_bidir_soma_ext

gpu: 0
